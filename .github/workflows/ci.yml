name: CI - Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes
        run: pytest -v --cov=app --cov-report=term-missing

      - name: Verificar cobertura
        run: |
          COVERAGE=$(pytest --cov=app --cov-report=term 2>/dev/null | grep TOTAL | awk '{print $4}' | tr -d '%')
          echo "Cobertura: ${COVERAGE}%"
          if [ "${COVERAGE}" -lt 70 ]; then echo "Cobertura abaixo de 70%!" && exit 1; fi
